name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'api/**'
      - 'handlers/**'
      - 'index.html'
      - 'package.json'
      - 'playwright.config.ts'
      - 'pnpm-lock.yaml'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tsconfig.json'
      - 'vite.config.js'
      - 'vite-env.d.ts'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'api/**'
      - 'handlers/**'
      - 'index.html'
      - 'package.json'
      - 'playwright.config.ts'
      - 'pnpm-lock.yaml'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tsconfig.json'
      - 'vite.config.js'
      - 'vite-env.d.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
        env:
          VITE_SAASMAKER_API_KEY: ${{ secrets.VITE_SAASMAKER_API_KEY }}
      - run: rm -rf dist/wasm  # 38MB Go WASM hosted on R2, not CF Pages

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy dist/ --project-name=swe-interview-prep --branch=${{ github.head_ref || github.ref_name }}

      - name: Smoke production
        if: github.event_name == 'push'
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 https://swe-interview-prep.pages.dev

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}' || 'https://${{ github.head_ref }}.swe-interview-prep.pages.dev';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed:** ${url}`
            })
