name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "blume.config.ts"
      - "scripts/validate-docs.mjs"
      - ".github/workflows/docs.yml"
      - "AGENTS.md"
      - "STATUS.md"
  pull_request:
    paths:
      - "docs/**"
      - "blume.config.ts"
      - "scripts/validate-docs.mjs"
      - ".github/workflows/docs.yml"
      - "AGENTS.md"
      - "STATUS.md"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate docs tree
        run: node scripts/validate-docs.mjs

  blume:
    name: Blume build + link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Optional: only runs if blume.config.ts is present. Blume is installed
    # ad-hoc here so the repo does not need it as a dependency.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi

      - name: Install Blume (ad-hoc)
        run: pnpm add -D blume --ignore-scripts

      - name: Blume validate (internal links)
        run: pnpm exec blume validate

      - name: Blume build (strict)
        run: pnpm exec blume build --strict --isolated
